version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels: [dependencies, rust]
    groups:
      cargo-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    groups:
      github-actions:
        patterns: ["*"]

