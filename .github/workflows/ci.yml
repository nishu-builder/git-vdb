name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  nix:
    name: Nix checks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Build and check
        run: nix flake check --print-build-logs

  windows:
    name: Cargo compatibility (windows-latest)
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install stable Rust
        run: rustup update stable --no-self-update
      - name: Run tests
        run: cargo test --all-targets --all-features --locked

  fastembed:
    name: Optional FastEmbed provider (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install stable Rust
        run: rustup update stable --no-self-update
      - name: Compile provider and examples
        run: cargo test --all-targets --features fastembed --locked --no-run

  msrv:
    name: Pinned Rust 1.97
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install pinned Rust
        run: rustup toolchain install 1.97.1 --profile minimal
      - name: Check library and doctests
        run: |
          cargo +1.97.1 check --lib --locked
          cargo +1.97.1 test --doc --locked

  package:
    name: Crate package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install stable Rust
        run: rustup update stable --no-self-update
      - name: Build publishable archive
        run: cargo package --locked

  python:
    name: Python client
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install pinned Rust
        run: rustup toolchain install 1.97.1 --profile minimal
      - name: Build CLI
        run: cargo +1.97.1 build --locked
      - name: Test Python client against CLI
        env:
          GIT_VDB_BIN: ${{ github.workspace }}/target/debug/git-vdb
          PYTHONPATH: python/src
        run: python3 -m unittest discover -s python/tests -v
      - name: Build Python wheel
        run: python3 -m pip wheel ./python --no-deps --wheel-dir /tmp/git-vdb-wheel
